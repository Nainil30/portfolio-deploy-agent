    shares: 15
    avg_cost_per_share: 485.00
    category: "etf"

  - ticker: "QQQM"
    shares: 12
    avg_cost_per_share: 175.00
    category: "etf"

  - ticker: "SPMO"
    shares: 20
    avg_cost_per_share: 72.00
    category: "etf"

  - ticker: "SCHD"
    shares: 25
    avg_cost_per_share: 76.00
    category: "etf"

  - ticker: "GLD"
    shares: 8
    avg_cost_per_share: 215.00
    category: "gold"

  - ticker: "AAPL"
    shares: 10
    avg_cost_per_share: 178.00
