
budget:
  monthly_amount: 1500.00
  currency: "USD"
  max_single_position_pct: 0.40

strategy: "split_tranches"

tranches:
  immediate_pct: 60
  dip_reserve_pct: 25
  deep_dip_reserve_pct: 15
  dip_threshold_pct: 2.0
  deep_dip_threshold_pct: 3.5
  dip_deadline_day: 20
  final_deadline_day: 28

schedule:
  payday: 17
  pay_frequency: "biweekly"

# ─── YOUR REAL HOLDINGS ─────────────────────────
# Open Fidelity → Accounts & Trade → Portfolio
# For each position, enter:
#   ticker: exact symbol
#   shares: from "Quantity" column
#   avg_cost_per_share: from "Cost Basis/Share" (click position → Lots)
#   category: your label (etf, stocks, gold, bonds, crypto, reit, etc.)

holdings:
  # ── ETFs ──
  - ticker: "VOO"
    shares: 0          # ← Replace with your real share count
    avg_cost_per_share: 0    # ← Replace with your real cost basis
    category: "etf"

  - ticker: "QQQM"
    shares: 0
    avg_cost_per_share: 0
    category: "etf"

  - ticker: "SPMO"
    shares: 0
    avg_cost_per_share: 0
    category: "etf"

  - ticker: "SCHD"
    shares: 0
    avg_cost_per_share: 0
    category: "etf"

  # ── Gold ──
  - ticker: "GLD"
    shares: 0
    avg_cost_per_share: 0
    category: "gold"

  # ── Stocks ──
  - ticker: "AAPL"
    shares: 0
    avg_cost_per_share: 0
    category: "stocks"

  - ticker: "MSFT"
    shares: 0
    avg_cost_per_share: 0
    category: "stocks"

  - ticker: "AMZN"
    shares: 0
    avg_cost_per_share: 0
    category: "stocks"

  # Add more positions below...
  # - ticker: "GOOGL"
  #   shares: 0
  #   avg_cost_per_share: 0
  #   category: "stocks"

# ─── YOUR ALLOCATION TARGETS ────────────────────
# Must sum to 100
category_targets:
  etf: 60
  stocks: 30
  gold: 10

llm:
  provider: "groq"
  model: "llama-3.1-8b-instant"

notifications:
  telegram:
    enabled: true7
