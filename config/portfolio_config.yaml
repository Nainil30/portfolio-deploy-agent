# ─── ALLOCATION TARGETS ───────────────────────
# 
# OPTION A: Category-level targets (RECOMMENDED)
# Just say what % goes to each category.
# Within each category, money is split equally 
# among the tickers, adjusted by market scores.
# Must sum to 100.
#
# OPTION B: Ticker-level targets 
# Uncomment target_allocation section below for precise control.

category_targets:
  etf: 60
  stocks: 30
  gold: 10

# Uncomment below to use ticker-level targets instead:
# target_allocation:
#   VOO: 20
#   QQQM: 15
#   SPMO: 12
#   SCHD: 13
#   GLD: 10
#   AAPL: 10
#   MSFT: 10
#   AMZN: 10

strategy: "weighted_dca"

llm:
  provider: "groq"
  model: "llama-3.1-8b-instant"

notifications:
  telegram:
    enabled: true

schedule:
  payday: 15
  max_wait_days: 10